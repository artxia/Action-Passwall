name: Openwrt-Passwall

on:
  schedule:
    - cron: 0 16 * * *
  workflow_dispatch:
    inputs:

jobs:
  build:
    runs-on:  ubuntu-latest

    name: Build ${{matrix.target}}
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Load Settings.ini
      run: |
        source ${{ github.workspace }}/user/${{ matrix.target }}/settings.ini
        echo "REPO_URL=$REPO_URL" >> $GITHUB_ENV
        echo "REPO_BRANCH=$REPO_BRANCH" >> $GITHUB_ENV
        echo "SSH_ACTIONS=$SSH_ACTIONS" >> $GITHUB_ENV
        echo "UPLOAD=$UPLOAD" >> $GITHUB_ENV
        echo "RELEASE=$RELEASE" >> $GITHUB_ENV
        echo "WECHAT=$WECHAT" >> $GITHUB_ENV

    - name: Initialization environment
      run: |
        docker rmi $(docker images -q) || true
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          libncurses-dev \
          libncurses5-dev \
          zlib1g-dev \
          gawk \
          git \
          gettext \
          libssl-dev \
          xsltproc \
          rsync \
          wget \
          unzip \
          python3 \
          python3-dev \
          ccache \
          subversion \
          flex \
          bison
        sudo apt-get autoremove -y --purge
        sudo apt-get clean
                
    - name: Clone source code
      run: |
        cd ${{ github.workspace }}
        git clone --depth 1 ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} openwrt
        useVersionInfo=$(git show -s --date=short --format="Author: %an<br/>date: %cd<br/>commit: %s<br/>commit hash: %H")
        echo "useVersionInfo=$useVersionInfo" >> $GITHUB_ENV

    - name: Clone source code
      run: |
        cd ${{ github.workspace }}
        git clone ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} openwrt
        useVersionInfo=$(git -C openwrt show -s --date=short --format="Author: %an<br/>date: %cd<br/>commit: %s<br/>commit hash: %H")
        echo "useVersionInfo=$useVersionInfo" >> $GITHUB_ENV

    - name: Apply Patches
      run: |
        echo "Apply patches"
        if [ -n "$(ls -A "user/common/patches" 2>/dev/null)" ]; then
        (
          find "user/common/patches" -type f -name '*.patch' -print0 | sort -z | xargs -I % -t -0 -n 1 sh -c "cat '%'  | patch -d 'openwrt' -p0 --forward"
        )
        fi
        if [ -n "$(ls -A "user/${{matrix.target}}/patches" 2>/dev/null)" ]; then
        (
          find "user/${{matrix.target}}/patches" -type f -name '*.patch' -print0 | sort -z | xargs -I % -t -0 -n 1 sh -c "cat '%'  | patch -d 'openwrt' -p0 --forward"
        )
        fi
        echo "Apply patch.sh"
        if [ -f "user/common/patch.sh" ]; then
        (
          cd openwrt
          /bin/bash "../user/common/patch.sh" ${{matrix.target}}
        )
        fi
        if [ -f "user/${{matrix.target}}/patch.sh" ]; then
        (
          cd openwrt
          /bin/bash "../user/${{matrix.target}}/patch.sh"
        )
        fi
   
    - name: Update feeds
      run: cd openwrt* && ./scripts/feeds clean && ./scripts/feeds update -a && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        echo "Apply files..."
        if [ -n "$(ls -A "user/common/files" 2>/dev/null)" ]; then
        (
          cp -rf user/common/files/* openwrt/package/base-files/files/
        )
        fi
        if [ -n "$(ls -A "user/${{matrix.target}}/files" 2>/dev/null)" ]; then
        (
          cp -rf user/${{matrix.target}}/files/* openwrt/package/base-files/files/
        )
        fi
        echo "Apply custom.sh"
        if [ -f "user/common/custom.sh" ]; then
        (
          cd openwrt
          /bin/bash "../user/common/custom.sh" ${{matrix.target}}
        )
        fi
        if [ -f "user/${{matrix.target}}/custom.sh" ]; then
        (
          cd openwrt
          /bin/bash "../user/${{matrix.target}}/custom.sh"
        )
        fi

    - name: Copy config
      run: |
        set -euo pipefail

        # 进入 openwrt 源目录（支持 openwrt 或 openwrt-*/ 模式）
        if [ -d openwrt ]; then
          cd openwrt
        else
          cd openwrt* || (echo "ERROR: openwrt directory not found"; ls -la; exit 1)
        fi

        echo "工作目录: $(pwd)"
        echo "列出 workspace 上层目录内容供诊断:"
        ls -la .. || true
        echo "列出 user/${{ matrix.target }} 目录内容:"
        ls -la ../user || true
        ls -la ../user/${{ matrix.target }} || true

        # 确认 config 文件存在
        if [ ! -f "../user/${{ matrix.target }}/config.diff" ]; then
          echo "ERROR: ../user/${{ matrix.target }}/config.diff 未找到"
          exit 1
        fi

        # 复制（保留原始文件以便重试），并打印片段便于排查
        cp -v "../user/${{ matrix.target }}/config.diff" .config
        echo "---- .config 前 200 行 ----"
        sed -n '1,200p' .config || true
        echo "---- .config 末尾 20 行 ----"
        tail -n 20 .config || true

        # 更新并安装 feeds（有助于避免后续缺包/元信息不全）
        echo "更新 feeds (scripts/feeds update -a)..."
        ./scripts/feeds clean || true
        ./scripts/feeds update -a || { echo "feeds update 失败，继续尝试 ./scripts/feeds install -a"; true; }
        ./scripts/feeds install -a || true

        # 运行 make defconfig；若失败，记录并输出详细日志以便定位
        echo "运行 make defconfig ..."
        if make defconfig; then
          echo "make defconfig 成功"
        else
          echo "make defconfig 失败，开始收集详细日志..."
          # 详细重试，单线程并带 V=s 输出更多信息
          make -j1 V=s 2>&1 | tee ../defconfig-detailed.log || true

          echo "---- defconfig 失败的最后 200 行（简要） ----"
          tail -n 200 ../defconfig-detailed.log || true

          echo "尝试搜索可能的 Kconfig / 错误关键字："
          grep -Ei "error|failed|missing|warning" ../defconfig-detailed.log | tail -n 100 || true

          echo "提示：若看到类似 'Unknown symbol'、'can't find'、或 'No such file or directory' 的错误，通常是："
          echo "  - config 中包含与当前 openwrt 源不兼容的选项（版本不匹配），或"
          echo "  - 构建前置工具（python3/distutils、某些 host 工具）未完全安装。"
          echo "请将上面 defconfig-detailed.log 的输出或 grep 的错误行贴给我，我会基于具体错误给出修复步骤。"
          exit 1
        fi

    - name: Download package
      run: |
        cd openwrt*
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt*
        echo -e "$(nproc) thread compile"
        make -j$(nproc) 2>&1 | tee -a build.log || make -j1 V=s 2>&1 | tee -a build.log
        ls -la ${{ github.workspace }}/openwrt/bin/targets/*/*/
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Assemble Firmware
      id: organizer
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        mkdir -p ${{ github.workspace }}/dist/Packages
        cp -r -f ${{ github.workspace }}/openwrt/bin/packages/*/*/*.ipk ${{ github.workspace }}/dist/Packages/
        cp -r -f ${{ github.workspace }}/openwrt/bin/targets/*/*/packages/*.ipk ${{ github.workspace }}/dist/Packages/
        rm -f ${{ github.workspace }}/dist/Packages.gz
        
    - name: Upload IPK
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_IPK
        path: ./dist/Packages

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        keep_minimum_runs: 30
